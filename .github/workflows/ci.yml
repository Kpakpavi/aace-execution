name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests + lint (Python 3.11)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: aace-execution

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Install dependencies (frozen)
        run: uv sync --frozen

      - name: Lint with ruff
        run: uv run ruff check src tests

      - name: Run test suite
        run: uv run pytest -v
